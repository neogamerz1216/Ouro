<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>New Tab</title>
  <style>
    /* ── variables ── */
    :root {
      --bg: #ffffff;
      --surface: #f1f3f4;
      --surface-hover: #e8eaed;
      --border: #dadce0;
      --text: #202124;
      --text-secondary: #5f6368;
      --accent: #1a73e8;
      --accent-hover: #1557b0;
      --shortcut-bg: #ffffff;
      --shortcut-hover: #f1f3f4;
      --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.15);
      --search-shadow: 0 2px 6px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
      --search-shadow-focus: 0 4px 16px rgba(26,115,232,0.2), 0 0 0 2px rgba(26,115,232,0.25);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --surface: #303134;
        --surface-hover: #3c4043;
        --border: #5f6368;
        --text: #e8eaed;
        --text-secondary: #9aa0a6;
        --accent: #8ab4f8;
        --accent-hover: #aecbfa;
        --shortcut-bg: #303134;
        --shortcut-hover: #3c4043;
        --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
        --shadow-hover: 0 4px 12px rgba(0,0,0,0.5);
        --search-shadow: 0 2px 6px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
        --search-shadow-focus: 0 4px 16px rgba(138,180,248,0.25), 0 0 0 2px rgba(138,180,248,0.3);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
    }

    /* ── layout ── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 20px;
      gap: 32px;
    }

    /* ── clock & greeting ── */
    .clock-section {
      text-align: center;
    }
    .clock {
      font-size: 72px;
      font-weight: 300;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .date-label {
      margin-top: 6px;
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    /* ── search bar ── */
    .search-box {
      width: min(560px, calc(100vw - 40px));
      position: relative;
    }

    .search-form {
      display: flex;
      align-items: center;
      background: var(--bg);
      border-radius: 24px;
      box-shadow: var(--search-shadow);
      padding: 0 16px;
      height: 48px;
      transition: box-shadow 0.2s;
      border: 1px solid var(--border);
    }

    .search-form:focus-within {
      box-shadow: var(--search-shadow-focus);
      border-color: transparent;
    }

    .search-icon {
      flex-shrink: 0;
      color: var(--text-secondary);
      margin-right: 12px;
      display: flex;
      align-items: center;
    }

    .search-icon svg {
      width: 20px;
      height: 20px;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--text);
      -webkit-user-select: text;
      caret-color: var(--accent);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-engine-badge {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-secondary);
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--surface);
      letter-spacing: 0.02em;
      margin-left: 8px;
    }

    /* ── shortcuts grid ── */
    .shortcuts-section {
      width: min(560px, calc(100vw - 40px));
    }

    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      justify-items: center;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      padding: 12px 8px;
      border-radius: 12px;
      width: 90px;
      transition: background 0.15s;
      cursor: pointer;
    }

    .shortcut:hover {
      background: var(--surface-hover);
    }

    .shortcut-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--shortcut-bg);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: box-shadow 0.15s;
      overflow: hidden;
    }

    .shortcut:hover .shortcut-icon {
      box-shadow: var(--shadow-hover);
    }

    .shortcut-icon img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .shortcut-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }

    /* add shortcut button */
    .shortcut-add .shortcut-icon {
      background: var(--surface);
      box-shadow: none;
      border: 2px dashed var(--border);
      color: var(--text-secondary);
      font-size: 20px;
    }
    .shortcut-add:hover .shortcut-icon {
      box-shadow: none;
      background: var(--surface-hover);
    }

    /* ── branding ── */
    .branding {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      position: absolute;
      bottom: 20px;
    }

    .branding-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── responsive ── */
    @media (max-width: 500px) {
      .clock { font-size: 52px; }
      .shortcuts-grid { grid-template-columns: repeat(4, 1fr); }
      .shortcut { width: 72px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Clock -->
    <div class="clock-section">
      <div class="clock" id="ntp-clock">00:00</div>
      <div class="date-label" id="ntp-date"></div>
    </div>

    <!-- Search bar -->
    <div class="search-box">
      <form class="search-form" id="ntp-search-form" autocomplete="off">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          class="search-input"
          id="ntp-search-input"
          type="text"
          placeholder="Search with DuckDuckGo or enter address"
          autofocus
        />
        <span class="search-engine-badge">DDG</span>
      </form>
    </div>

    <!-- Shortcuts -->
    <div class="shortcuts-section">
      <div class="shortcuts-grid" id="ntp-shortcuts">

        <a class="shortcut" href="https://www.google.com" title="Google">
          <div class="shortcut-icon">
            <img src="https://www.google.com/favicon.ico" alt="Google" onerror="this.parentNode.textContent='G'"/>
          </div>
          <span class="shortcut-label">Google</span>
        </a>

        <a class="shortcut" href="https://www.youtube.com" title="YouTube">
          <div class="shortcut-icon">
            <img src="https://www.youtube.com/favicon.ico" alt="YouTube" onerror="this.parentNode.textContent='▶'"/>
          </div>
          <span class="shortcut-label">YouTube</span>
        </a>

        <a class="shortcut" href="https://www.github.com" title="GitHub">
          <div class="shortcut-icon">
            <img src="https://github.com/favicon.ico" alt="GitHub" onerror="this.parentNode.textContent='GH'"/>
          </div>
          <span class="shortcut-label">GitHub</span>
        </a>

        <a class="shortcut" href="https://www.reddit.com" title="Reddit">
          <div class="shortcut-icon">
            <img src="https://www.reddit.com/favicon.ico" alt="Reddit" onerror="this.parentNode.textContent='R'"/>
          </div>
          <span class="shortcut-label">Reddit</span>
        </a>

        <a class="shortcut" href="https://www.twitter.com" title="X / Twitter">
          <div class="shortcut-icon">
            <img src="https://abs.twimg.com/favicons/twitter.3.ico" alt="X" onerror="this.parentNode.textContent='X'"/>
          </div>
          <span class="shortcut-label">Twitter</span>
        </a>

        <a class="shortcut" href="https://mail.google.com" title="Gmail">
          <div class="shortcut-icon">
            <img src="https://mail.google.com/favicon.ico" alt="Gmail" onerror="this.parentNode.textContent='M'"/>
          </div>
          <span class="shortcut-label">Gmail</span>
        </a>

        <a class="shortcut" href="https://www.wikipedia.org" title="Wikipedia">
          <div class="shortcut-icon">
            <img src="https://www.wikipedia.org/favicon.ico" alt="Wikipedia" onerror="this.parentNode.textContent='W'"/>
          </div>
          <span class="shortcut-label">Wikipedia</span>
        </a>

        <a class="shortcut" href="https://news.ycombinator.com" title="Hacker News">
          <div class="shortcut-icon">
            <img src="https://news.ycombinator.com/favicon.ico" alt="HN" onerror="this.parentNode.textContent='HN'"/>
          </div>
          <span class="shortcut-label">HN</span>
        </a>

        <a class="shortcut" href="https://www.linkedin.com" title="LinkedIn">
          <div class="shortcut-icon">
            <img src="https://www.linkedin.com/favicon.ico" alt="LinkedIn" onerror="this.parentNode.textContent='in'"/>
          </div>
          <span class="shortcut-label">LinkedIn</span>
        </a>

        <button class="shortcut shortcut-add" id="ntp-add-shortcut" title="Add shortcut">
          <div class="shortcut-icon">＋</div>
          <span class="shortcut-label">Add shortcut</span>
        </button>

      </div>
    </div>

    <!-- Branding -->
    <div class="branding">
      <div class="branding-dot"></div>
      <span>Ouro Browser — Fast &amp; Private</span>
    </div>

  </div>

  <script>
    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('ntp-clock').textContent = h + ':' + m;

      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('ntp-date').textContent =
        days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
    }
    updateClock();
    setInterval(updateClock, 10000);

    // ── Search ──
    document.getElementById('ntp-search-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const q = document.getElementById('ntp-search-input').value.trim();
      if (!q) return;
      // If it looks like a URL, navigate directly; otherwise search DDG
      const urlLike = /^(https?:\/\/|www\.)/.test(q) || /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(q);
      window.location.href = urlLike
        ? (q.startsWith('http') ? q : 'https://' + q)
        : 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
    });

    // ── Shortcut links (open in same tab / navigate) ──
    document.querySelectorAll('.shortcut[href]').forEach(function(a) {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = a.href;
      });
    });
  </script>
</body>
</html>
